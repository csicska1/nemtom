<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CS:GO HTML</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin:0; overflow:hidden; background:#000; font-family:'Press Start 2P', sans-serif; }
        canvas { display:block; }
        #gameContainer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; overflow: hidden;
        }
        #menu {
            position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95);
            display:flex; flex-direction:column; align-items:center; justify-content:center; color:#ffcc00; z-index:100;
            text-shadow: 0 0 10px #ff0000;
        }
        #title {
            font-size: 80px; letter-spacing: 8px; margin-bottom: 60px; text-transform: uppercase;
            animation: glow 2s infinite alternate;
        }
        @keyframes glow { 0% { text-shadow: 0 0 20px #ff0000; } 100% { text-shadow: 0 0 40px #ffff00; } }
        .btn {
            background:#222; color:#ffcc00; border:4px solid #ffcc00; padding:20px 60px; font-size:28px;
            margin:15px; cursor:pointer; transition:all 0.2s; text-transform:uppercase;
        }
        .btn:hover { background:#ffcc00; color:#000; transform:scale(1.05); }
        #hud {
            position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:50;
            color:#fff; font-size:14px; text-shadow:0 0 5px #000;
        }
        #crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:30px; color:#fff; opacity:0.7; }
        #health { position:absolute; bottom:20px; left:20px; font-size:24px; }
        #ammo { position:absolute; bottom:20px; right:20px; font-size:32px; text-align:right; }
        #timer { position:absolute; top:20px; left:50%; transform:translateX(-50%); font-size:24px; background:rgba(0,0,0,0.6); padding:5px 20px; border-radius:4px; }
        #scores { position:absolute; top:20px; left:20px; font-size:28px; display:flex; gap:40px; }
        #killfeed { position:absolute; top:80px; left:20px; width:300px; }
        .kill { background:rgba(0,0,0,0.7); padding:4px 10px; margin:2px 0; font-size:13px; }
        #minimap { position:absolute; top:20px; right:20px; width:180px; height:180px; border:3px solid #ffcc00; background:rgba(0,0,0,0.7); }
        #weaponName { position:absolute; bottom:80px; right:20px; font-size:18px; color:#ffcc00; }
        #roundInfo { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:60px; color:#ffcc00; text-align:center; display:none; pointer-events:none; }
        #moneyPopup { position:absolute; top:60%; left:50%; transform:translate(-50%,-50%); font-size:28px; color:#ffcc00; display:none; text-shadow:0 0 15px #00ff00; }
        #pauseMenu { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff; z-index:200; }
    </style>
</head>
<body>
<div id="menu">
    <div id="title">CS:GO HTML</div>
    <div class="btn" onclick="startGame('T')">PLAY AS TERRORISTS</div>
    <div class="btn" onclick="startGame('CT')">PLAY AS COUNTER-TERRORISTS</div>
</div>

<div id="gameContainer">

        <div id="health">100 HP</div>

// SECTION 2: MAP CREATION - HIGHLY DETAILED DUST 2 RECREATION WITH 60+ OBJECTS

// Helper wall and ramp functions with comments
function addWall(x, y, z, w, h, d, color) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshLambertMaterial({color: color});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    walls.push(mesh);
}

function addRamp(x, y, z, w, h, d, color) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshLambertMaterial({color: color});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.rotation.x = Math.PI / 6;
    scene.add(mesh);
    walls.push(mesh);
}

function createSiteLabel(x, y, z, text) {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 140px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(text, 128, 170);
    const tex = new THREE.CanvasTexture(canvas);
    const mat = new THREE.MeshBasicMaterial({map: tex, transparent: true});
    const plane = new THREE.Mesh(new THREE.PlaneGeometry(5, 5), mat);
    plane.position.set(x, y, z);
    plane.lookAt(0, 0, 0);
    scene.add(plane);
}

// SECTION 4: BOT CLASS WITH FULL STATE MACHINE
class Bot {
    constructor(isEnemy, spawn) {
        this.health = 100;
        this.position = spawn.clone();
        this.velocity = new THREE.Vector3();
        this.state = 'patrol'; // patrol, chase, attack, cover
        const col = isEnemy ? (playerSide === 'T' ? 0x00ff00 : 0xff0000) : (playerSide === 'T' ? 0xff0000 : 0x00ff00);
        this.mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshLambertMaterial({color: col}));
        this.mesh.position.copy(this.position);
        scene.add(this.mesh);
        this.lastShot = Date.now() + 1500; // delayed start
        this.waypoints = [...spawnPointsT, ...spawnPointsCT];
        this.currentWP = Math.floor(Math.random() * this.waypoints.length);
        this.team = isEnemy ? (playerSide === 'T' ? 'CT' : 'T') : playerSide;
        this.coverTimer = 0;
    }
    update(delta) {
        if (this.health <= 0) return;
        const playerDir = camera.position.clone().sub(this.position);
        const dist = playerDir.length();

        // State machine logic
        if (dist < 28) {
            this.state = 'chase';
        } else if (dist < 12) {
            this.state = 'attack';
        } else {
            this.state = 'patrol';
        }

        if (this.state === 'patrol') {
            const wp = this.waypoints[this.currentWP];
            const dir = wp.clone().sub(this.position);
            if (dir.length() < 3) this.currentWP = (this.currentWP + 1) % this.waypoints.length;
            this.velocity.copy(dir.normalize()).multiplyScalar(5 * delta);
        } else if (this.state === 'chase' || this.state === 'attack') {
            const ray = new THREE.Raycaster(this.position.clone().add(new THREE.Vector3(0, 1.2, 0)), playerDir.normalize());
            const hits = ray.intersectObjects(walls);
            if (hits.length === 0 || hits[0].distance > dist) {
                this.velocity.copy(playerDir.normalize()).multiplyScalar(8 * delta);
                if (Date.now() - this.lastShot > 950) {
                    this.shoot();
                    this.lastShot = Date.now();
                }
            } else {
                this.state = 'cover';
            }
        } else if (this.state === 'cover') {
            this.coverTimer += delta;
            if (this.coverTimer > 2) {
                this.state = 'patrol';
                this.coverTimer = 0;
            }
            this.velocity.multiplyScalar(0.3);
        }

        this.position.add(this.velocity);
        this.position.y = 1;
        this.mesh.position.copy(this.position);
    }
    shoot() {
        const start = this.position.clone().add(new THREE.Vector3(0, 1.2, 0));
        const dir = camera.position.clone().sub(this.position).normalize();
        createBulletTrail(start, start.clone().add(dir.multiplyScalar(40)));
        if (Math.random() > 0.52) {
            health = Math.max(0, health - 14);
            updateHUD();
            if (health <= 0) endRound(false);
        }
    }
}

// Bullet trail helper
function createBulletTrail(start, end) {
    const geo = new THREE.BufferGeometry().setFromPoints([start, end]);
    const mat = new THREE.LineBasicMaterial({color: 0xffff00});
    const line = new THREE.Line(geo, mat);
    scene.add(line);
    bullets.push({mesh: line, life: 0.25});
}

// Muzzle flash
function createMuzzleFlash() {
    if (muzzleFlash) camera.remove(muzzleFlash);
    muzzleFlash = new THREE.PointLight(0xffaa00, 8, 8);
    muzzleFlash.position.set(0.45, -0.25, -0.7);
    camera.add(muzzleFlash);
    setTimeout(() => {
        if (muzzleFlash) {
            camera.remove(muzzleFlash);
            muzzleFlash = null;
        }
    }, 70);
}

// SECTION 5: THREE.JS INITIALIZATION WITH FULL LIGHTING AND SETUP
function initThree() {
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x112233, 25, 95);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x112233);
    document.getElementById('gameContainer').appendChild(renderer.domElement);

    // Full lighting setup for visibility
    const ambient = new THREE.AmbientLight(0x888888, 0.65);
    scene.add(ambient);
    const hemi = new THREE.HemisphereLight(0xccccff, 0x334422, 0.95);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xffffff, 1.15);
    sun.position.set(30, 50, -20);
    scene.add(sun);

    createMap();

    // Spawn player inside map with correct orientation
    camera.position.copy(playerSide === 'T' ? spawnPointsT[0] : spawnPointsCT[0]);
    camera.rotation.order = 'YXZ';
    camera.lookAt(0, 1.6, 0);
    camera.rotation.x = 0; // force upright
    pitch = 0;
    yaw = camera.rotation.y;

    createWeapons();

    // Attach starting weapon (rifle)
    const weaponGroup = weapons[2].model;
    camera.add(weaponGroup);
    weaponGroup.position.set(0.38, -0.32, -0.65);
    weaponGroup.rotation.set(-0.15, 0.12, 0);

    // Spawn full 5v5 bots
    playerTeamBots = [];
    enemyBots = [];
    for (let i = 0; i < 4; i++) {
        playerTeamBots.push(new Bot(false, spawnPointsT[Math.floor(Math.random() * 3)]));
    }
    for (let i = 0; i < 5; i++) {
        enemyBots.push(new Bot(true, spawnPointsCT[Math.floor(Math.random() * 3)]));
    }

    // Event listeners
    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('keyup', onKeyUp);
    renderer.domElement.addEventListener('click', () => {
        if (!pointerLocked) renderer.domElement.requestPointerLock();
    });
    document.addEventListener('pointerlockchange', () => {
        pointerLocked = document.pointerLockElement === renderer.domElement;
    });
    document.addEventListener('mousemove', onMouseMove);
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    window.addEventListener('mousedown', (e) => {
        if (e.button === 0 && pointerLocked && gameRunning && !paused) shoot();
    });
}

// Mouse look - fixed sign
function onMouseMove(e) {
    if (!pointerLocked) return;
    yaw -= e.movementX * 0.0018;
    pitch -= e.movementY * 0.0018;
    pitch = Math.max(-1.5, Math.min(1.5, pitch));
    camera.rotation.x = pitch;
    camera.rotation.y = yaw;
}

// Keyboard controls
function onKeyDown(e) {
    switch (e.code) {
        case 'KeyW': moveForward = true; break;
        case 'KeyS': moveBackward = true; break;
        case 'KeyA': moveLeft = true; break;
        case 'KeyD': moveRight = true; break;
        case 'ShiftLeft': isRunning = true; break;
        case 'Space': if (canJump) { velocity.y = 13; canJump = false; } break;
        case 'Key1': switchWeapon(0); break;
        case 'Key2': switchWeapon(1); break;
        case 'Key3': switchWeapon(2); break;
        case 'Key4': switchWeapon(3); break;
        case 'KeyE': attemptPlantOrDefuse(); break;
        case 'Escape': if (gameRunning) togglePause(); break;
    }
}

function onKeyUp(e) {
    switch (e.code) {
        case 'KeyW': moveForward = false; break;
        case 'KeyS': moveBackward = false; break;
        case 'KeyA': moveLeft = false; break;
        case 'KeyD': moveRight = false; break;
        case 'ShiftLeft': isRunning = false; break;
    }
}

// Weapon switch
function switchWeapon(i) {
    if (i === currentWeaponIndex) return;
    const old = camera.children.find(c => c.type === 'Group');
    if (old) camera.remove(old);
    currentWeaponIndex = i;
    const w = weapons[i].model;
    camera.add(w);
    w.position.set(0.38, -0.32, -0.65);
    document.getElementById('weaponName').textContent = weapons[i].name;
    updateHUD();
}

// Shooting with spread and recoil
function shoot() {
    const w = weapons[currentWeaponIndex];
    if (w.ammo <= 0 && w.name !== "KNIFE") return;
    if (Date.now() - (w.lastShot || 0) < w.fireRate) return;
    w.lastShot = Date.now();

    createMuzzleFlash();
    playSound(w.name.includes("KNIFE") ? 120 : 650, w.name.includes("KNIFE") ? 0.12 : 0.06);

    // Recoil
    pitch -= 0.09;
    camera.rotation.x = pitch;

    // Raycast with small spread
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2((Math.random() - 0.5) * 0.02, (Math.random() - 0.5) * 0.02), camera);
    const hits = ray.intersectObjects(walls.concat(enemyBots.map(b => b.mesh)), true);

    if (hits.length > 0) {
        const hit = hits[0];
        createBulletTrail(camera.position, hit.point);
        for (let b of enemyBots) {
            if (b.mesh === hit.object) {
                let dmg = w.damage;
                if (hit.point.y > b.position.y + 1.45) dmg *= 2.8; // headshot
                b.health -= dmg;
                if (b.health <= 0) {
                    addKillFeed("YOU", b.team);
                    scene.remove(b.mesh);
                    enemyBots = enemyBots.filter(bb => bb !== b);
                    if (enemyBots.length === 0) endRound(true);
                }
                break;
            }
        }
    } else {
        createBulletTrail(camera.position, camera.position.clone().add(ray.ray.direction.multiplyScalar(60)));
    }

    if (w.name !== "KNIFE") {
        w.ammo--;
        updateHUD();
    }
}

// Sound system
function playSound(freq, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    gain.gain.value = 0.35;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    setTimeout(() => osc.stop(), duration * 1000);
}

// Plant / defuse
function attemptPlantOrDefuse() {
    const p = camera.position;
    if (playerSide === 'T' && !isPlanted) {
        if (p.distanceTo(bombSites.A.pos) < bombSites.A.radius || p.distanceTo(bombSites.B.pos) < bombSites.B.radius) {
            isPlanted = true;
            bombTimer = 40;
            plantedBombMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 1.8), new THREE.MeshLambertMaterial({color: 0xff2200}));
            plantedBombMesh.position.copy(p).add(new THREE.Vector3(0, 0.3, 0));
            scene.add(plantedBombMesh);
        }
    } else if (playerSide === 'CT' && isPlanted && plantedBombMesh) {
        if (p.distanceTo(plantedBombMesh.position) < 4) {
            defuseProgress += 0.016;
            if (defuseProgress >= 5) {
                scene.remove(plantedBombMesh);
                plantedBombMesh = null;
                isPlanted = false;
                defuseProgress = 0;
                addKillFeed("BOMB DEFUSED", "");
                endRound(true);
            }
        }
    }
}

// Movement with gravity and collision
function updateMovement(delta) {
    velocity.x = velocity.z = 0;
    const speed = (isRunning ? 19 : 12.5) * delta;
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    dir.y = 0;
    dir.normalize();

    if (moveForward) velocity.addScaledVector(dir, speed);
    if (moveBackward) velocity.addScaledVector(dir, -speed * 0.75);
    if (moveLeft) velocity.addScaledVector(new THREE.Vector3(-dir.z, 0, dir.x), speed);
    if (moveRight) velocity.addScaledVector(new THREE.Vector3(dir.z, 0, -dir.x), speed);

    velocity.y -= 35 * delta;
    camera.position.y += velocity.y * delta;
    if (camera.position.y < 1.6) {
        camera.position.y = 1.6;
        velocity.y = 0;
        canJump = true;
    }

    const oldPos = camera.position.clone();
    camera.position.x += velocity.x;
    camera.position.z += velocity.z;

    // AABB collision
    const playerBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(1, 2.2, 1));
    let collided = false;
    for (let wall of walls) {
        const wallBox = new THREE.Box3().setFromObject(wall);
        if (wallBox.intersectsBox(playerBox)) {
            collided = true;
            break;
        }
    }
    if (collided) camera.position.copy(oldPos);

    // Map bounds
    camera.position.x = Math.max(-38, Math.min(38, camera.position.x));
    camera.position.z = Math.max(-38, Math.min(38, camera.position.z));
}

// HUD update
function updateHUD() {
    document.getElementById('health').textContent = Math.floor(health) + " HP";
    const w = weapons[currentWeaponIndex];
    document.getElementById('ammo').textContent = (w.ammo === Infinity ? "∞" : w.ammo) + " / " + (w.maxAmmo === Infinity ? "∞" : w.maxAmmo);
}

// Kill feed full implementation
function addKillFeed(killer, victim) {
    const feed = document.getElementById('killfeed');
    const entry = document.createElement('div');
    entry.className = 'kill';
    entry.innerHTML = `${killer} <span style="color:#ff0000">→</span> ${victim}`;
    feed.prepend(entry);
    setTimeout(() => {
        if (entry.parentNode) entry.parentNode.removeChild(entry);
    }, 4800);
}

// Minimap
function updateMinimap() {
    const ctx = document.getElementById('minimap').getContext('2d');
    ctx.fillStyle = '#0a1a0a';
    ctx.fillRect(0, 0, 180, 180);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 4;
    ctx.strokeRect(15, 15, 150, 150);

    const px = ((camera.position.x + 40) / 80) * 180;
    const pz = ((camera.position.z + 40) / 80) * 180;
    ctx.fillStyle = '#00ff00';
    ctx.fillRect(px - 4, pz - 4, 8, 8);

    ctx.fillStyle = '#ff0000';
    for (let b of enemyBots) {
        if (b.health > 0) {
            const bx = ((b.position.x + 40) / 80) * 180;
            const bz = ((b.position.z + 40) / 80) * 180;
            ctx.fillRect(bx - 3, bz - 3, 6, 6);
        }
    }
}

// Bomb update with timer
function updateBomb() {
    if (!isPlanted || !plantedBombMesh) return;
    bombTimer -= 0.016;
    if (bombTimer <= 0) {
        scene.remove(plantedBombMesh);
        plantedBombMesh = null;
        isPlanted = false;
        endRound(false);
    }
    // Fake beep sound every second
    if (Math.floor(bombTimer) % 1 === 0 && Math.random() > 0.7) playSound(1100 - bombTimer * 12, 0.05);
}

// Round end with money popup
function endRound(playerWon) {
    gameRunning = false;
    clearInterval(timerInterval);
    const info = document.getElementById('roundInfo');
    info.style.display = 'block';
    info.textContent = playerWon ? (playerSide === 'T' ? "TERRORISTS WIN" : "COUNTER-TERRORISTS WIN") : (playerSide === 'T' ? "COUNTER-TERRORISTS WIN" : "TERRORISTS WIN");

    if (playerWon) {
        playerSide === 'T' ? tScore++ : ctScore++;
        playerMoney += 800;
    } else {
        playerSide === 'T' ? ctScore++ : tScore++;
    }

    document.getElementById('tScore').textContent = tScore;
    document.getElementById('ctScore').textContent = ctScore;

    // Money popup
    const popup = document.getElementById('moneyPopup');
    popup.textContent = `+$800`;
    popup.style.display = 'block';
    setTimeout(() => {
        popup.style.display = 'none';
    }, 2200);

    setTimeout(() => {
        info.style.display = 'none';
        resetRound();
    }, 2800);
}

// Reset round
function resetRound() {
    health = 100;
    isPlanted = false;
    defuseProgress = 0;
    if (plantedBombMesh) {
        scene.remove(plantedBombMesh);
        plantedBombMesh = null;
    }

    camera.position.copy(playerSide === 'T' ? spawnPointsT[0] : spawnPointsCT[0]);
    camera.rotation.order = 'YXZ';
    camera.lookAt(0, 1.6, 0);
    camera.rotation.x = 0;
    pitch = 0;
    yaw = camera.rotation.y;

    playerTeamBots.forEach(b => scene.remove(b.mesh));
    enemyBots.forEach(b => scene.remove(b.mesh));
    playerTeamBots = [];
    enemyBots = [];
    for (let i = 0; i < 4; i++) playerTeamBots.push(new Bot(false, spawnPointsT[Math.floor(Math.random() * 3)]));
    for (let i = 0; i < 5; i++) enemyBots.push(new Bot(true, spawnPointsCT[Math.floor(Math.random() * 3)]));

    weapons.forEach(w => {
        if (w.ammo !== Infinity) w.ammo = w.maxAmmo;
    });

    roundTime = 115;
    startRoundTimer();
    gameRunning = true;
    updateHUD();
}

function startRoundTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        roundTime--;
        const m = Math.floor(roundTime / 60);
        const s = roundTime % 60;
        document.getElementById('timer').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (roundTime <= 0) endRound(playerSide === 'CT');
    }, 1000);
}

// Animation loop with weapon bob
function animate() {
    requestAnimationFrame(animate);
    if (!gameRunning || paused) {
        renderer.render(scene, camera);
        return;
    }

    const delta = (performance.now() - prevTime) / 1000;
    prevTime = performance.now();

    updateMovement(delta);

    // Weapon bob and sway
    const bob = Math.sin(performance.now() / 70) * 0.018;
    const wg = camera.children.find(c => c.type === 'Group');
    if (wg) {
        wg.position.y = -0.32 + bob;
        wg.rotation.z = Math.sin(performance.now() / 180) * 0.015;
    }

    playerTeamBots.forEach(b => b.update(delta));
    enemyBots.forEach(b => b.update(delta));

    // Bullet cleanup
    for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].life -= delta;
        if (bullets[i].life <= 0) {
            scene.remove(bullets[i].mesh);
            bullets.splice(i, 1);
        }
    }

    updateBomb();
    updateHUD();
    updateMinimap();

    if (enemyBots.length === 0) endRound(true);
    if (health <= 0) endRound(false);

    renderer.render(scene, camera);
}

// Start game
function startGame(side) {
    playerSide = side;
    document.getElementById('menu').style.display = 'none';
    initThree();
    switchWeapon(2); // start with rifle
    gameRunning = true;
    startRoundTimer();
    animate();
}

function togglePause() {
    paused = !paused;
    document.getElementById('pauseMenu').style.display = paused ? 'flex' : 'none';
}

function resumeGame() {
    togglePause();
}

// Fullscreen on container to keep HUD visible
document.addEventListener('click', () => {
    if (gameRunning && !document.fullscreenElement) {
        const container = document.getElementById('gameContainer');
        if (container.requestFullscreen) container.requestFullscreen();
    }
}, {once: true});
