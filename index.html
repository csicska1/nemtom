<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Mini de_dust2 FPS – FIXED (works on double-click)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
            color: #eee;
        }

        #ui {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 30px 60px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            display: none;
        }

        #teamSelect {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            pointer-events: all;
        }

        .teamBtn {
            font-size: 36px;
            padding: 20px 60px;
            margin: 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #ct {
            background: #2255ff;
            color: white;
        }

        #t {
            background: #ff4422;
            color: white;
        }

        #hud {
            position: absolute;
            bottom: 16px;
            left: 16px;
            font-size: 20px;
            pointer-events: none;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            opacity: 0.7;
            pointer-events: none;
        }

        #centerMsg {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 90px;
            font-weight: bold;
            text-shadow: 0 0 20px black;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s;
        }

        #timer {
            font-size: 40px;
            color: lime;
            margin-top: 8px;
        }

        #buyMenu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.92);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            display: none;
            pointer-events: all;
            max-width: 620px;
        }

        .weaponOption {
            background: #333;
            color: white;
            padding: 16px;
            margin: 8px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 19px;
        }

        .weaponOption:hover {
            background: #555;
        }
    </style>
</head>

<body>

    <div id="ui">
        <div id="teamSelect">
            <h1>Choose Team</h1>
            <button id="ct" class="teamBtn">Counter-Terrorist</button>
            <button id="t" class="teamBtn">Terrorist</button>
        </div>
        <div id="instructions">Click to play<br>
            <small>WASD move • Mouse look • LMB shoot/knife • RMB aim • R reload • B buy • 1-4 weapons • E plant (T) •
                SPACE jump • SHIFT run</small>
        </div>
        <div id="hud">
            Health: <span id="hp">100</span> | Money: $<span id="money">800</span><br>
            Weapon: <span id="weapon">USP-S</span> | Ammo: <span id="ammo">15 / 45</span>
        </div>
        <div id="crosshair">+</div>
        <div id="centerMsg"></div>
        <div id="buyMenu">
            <h2>Buy Menu (B to close)</h2>
            <div id="primaryBuy" class="weaponOption">Primary Rifle — $2700</div>
            <div id="smgBuy" class="weaponOption">SMG — $1500 (CT) / $1050 (T)</div>
            <div id="knifeBuy" class="weaponOption">Knife — Free</div>
        </div>
    </div>

    <!-- THREE.JS LOADS FIRST -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.171.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // ==================== WAIT FOR THREE.JS TO LOAD ====================
        window.onload = function () {

            // ==================== CONFIG ====================
            const PLAYER = { height: 1.8, speed: 9.5, sprintMult: 1.65, jump: 8.8, gravity: -26 };

            const WEAPONS = {
                m4a4: { name: "M4A4", team: "CT", dmgBody: 28, dmgHead: 95, rate: 0.085, recoil: 0.08, ammo: 30, max: 90 },
                ak47: { name: "AK-47", team: "T", dmgBody: 36, dmgHead: 110, rate: 0.1, recoil: 0.12, ammo: 30, max: 90 },
                usps: { name: "USP-S", team: "CT", dmgBody: 20, dmgHead: 55, rate: 0.14, recoil: 0.05, ammo: 12, max: 24 },
                glock: { name: "Glock", team: "T", dmgBody: 18, dmgHead: 50, rate: 0.12, recoil: 0.04, ammo: 20, max: 40 },
                mp7: { name: "MP7", team: "CT", dmgBody: 22, dmgHead: 60, rate: 0.06, recoil: 0.06, ammo: 40, max: 120 },
                mac10: { name: "MAC-10", team: "T", dmgBody: 24, dmgHead: 65, rate: 0.07, recoil: 0.07, ammo: 30, max: 100 },
                knife: { name: "Knife", dmg: 68, rate: 0.65 }
            };

            let scene, camera, renderer, controls;
            let velocity = new THREE.Vector3();
            let move = { fwd: false, bwd: false, left: false, right: false, jump: false, sprint: false };
            let canJump = false, isAiming = false, health = 100, money = 800;
            let currentWeapon = null;
            let ammo = {};
            let lastShot = 0, isReloading = false;
            let roundActive = false, timeLeft = 90, planted = false, bombTimer = 0;
            let team = null, isDead = false;

            let weaponGroup, bombModel, bombLight;
            const collidables = [], enemies = [], casings = [], tracers = [];
            const waypoints = [
                new THREE.Vector3(-45, 1.8, -55), new THREE.Vector3(-20, 1.8, -30),
                new THREE.Vector3(0, 1.8, 0), new THREE.Vector3(30, 1.8, 30),
                new THREE.Vector3(-40, 1.8, -20), new THREE.Vector3(45, 1.8, 45)
            ];

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // ==================== FUNCTIONS ====================
            function onMouseDown(e) {
                if (!controls.isLocked || isDead || !roundActive || isReloading) return;
                if (e.button === 0) {
                    if (currentWeapon === 'knife') knifeAttack();
                    else shoot();
                } else if (e.button === 2) {
                    isAiming = !isAiming;
                    camera.fov = isAiming ? 64 : 92;
                    camera.updateProjectionMatrix();
                }
            }

            function shoot() {
                const w = WEAPONS[currentWeapon];
                const now = performance.now() / 1000;
                if (now - lastShot < w.rate || ammo[currentWeapon] <= 0) return;
                lastShot = now; ammo[currentWeapon]--; updateHUD();

                const origin = camera.position.clone();
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);

                const tracer = new THREE.Line(
                    new THREE.BufferGeometry().setFromPoints([origin, origin.clone().addScaledVector(dir, 80)]),
                    new THREE.LineBasicMaterial({ color: 0xffee66, transparent: true, opacity: 0.9 })
                );
                scene.add(tracer); tracers.push({ obj: tracer, life: 0.14 });

                const flash = new THREE.PointLight(0xffaa33, 7, 40);
                flash.position.copy(origin).addScaledVector(dir, 1.4); scene.add(flash);
                setTimeout(() => scene.remove(flash), 80);
                if (weaponGroup) weaponGroup.rotation.x += w.recoil || 0.08;

                playSound(440, 0.05, 'sawtooth');

                const ray = new THREE.Raycaster(origin, dir);
                const hits = ray.intersectObjects(collidables, true);
                let hitEnemy = null, isHead = false;
                for (let h of hits) {
                    if (h.object.userData.isEnemy) { hitEnemy = h.object; isHead = h.object.userData.isHead === true; break; }
                }
                if (hitEnemy) {
                    const dmg = isHead ? w.dmgHead : w.dmgBody;
                    hitEnemy.userData.health -= dmg;
                    playSound(180, 0.08, 'square');
                    if (hitEnemy.userData.health <= 0) {
                        scene.remove(hitEnemy);
                        enemies.splice(enemies.indexOf(hitEnemy), 1);
                        money += 300; updateHUD(); checkRoundEnd();
                    }
                }
            }

            function knifeAttack() {
                const now = performance.now() / 1000;
                if (now - lastShot < WEAPONS.knife.rate) return;
                lastShot = now;
                const origin = camera.position.clone();
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                const ray = new THREE.Raycaster(origin, dir, 0, 2.8);
                const hits = ray.intersectObjects(enemies);
                if (hits.length) {
                    const target = hits[0].object;
                    target.userData.health -= WEAPONS.knife.dmg;
                    if (target.userData.health <= 0) { scene.remove(target); enemies.splice(enemies.indexOf(target), 1); checkRoundEnd(); }
                }
            }

            function reload() {
                if (isReloading || currentWeapon === 'knife') return;
                isReloading = true;
                setTimeout(() => { ammo[currentWeapon] = WEAPONS[currentWeapon].max || 30; isReloading = false; updateHUD(); }, 1600);
            }

            function toggleBuyMenu() {
                const menu = document.getElementById('buyMenu');
                menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
            }

            function buyWeapon(id) {
                const map = { primaryBuy: team === 'CT' ? 'm4a4' : 'ak47', smgBuy: team === 'CT' ? 'mp7' : 'mac10', knifeBuy: 'knife' };
                const wName = map[id];
                const cost = (wName === 'm4a4' || wName === 'ak47') ? 2700 : (wName === 'knife' ? 0 : 1500);
                if (money < cost) return;
                money -= cost;
                if (wName !== 'knife') ammo[wName] = WEAPONS[wName].ammo;
                switchWeapon(wName);
                updateHUD();
                toggleBuyMenu();
            }

            function switchWeapon(name) {
                if (!WEAPONS[name]) return;
                currentWeapon = name;
                updateHUD();
            }

            function handleKey(code, down) {
                switch (code) {
                    case 'KeyW': move.fwd = down; break;
                    case 'KeyS': move.bwd = down; break;
                    case 'KeyA': move.left = down; break;
                    case 'KeyD': move.right = down; break;
                    case 'Space': if (down && canJump) { velocity.y = PLAYER.jump; canJump = false; } break;
                    case 'ShiftLeft': case 'ShiftRight': move.sprint = down; break;
                    case 'KeyR': if (down && !isReloading) reload(); break;
                    case 'KeyB': if (down) toggleBuyMenu(); break;
                    case 'Digit1': if (down) switchWeapon(team === 'CT' ? 'm4a4' : 'ak47'); break;
                    case 'Digit2': if (down) switchWeapon(team === 'CT' ? 'usps' : 'glock'); break;
                    case 'Digit3': if (down) switchWeapon(team === 'CT' ? 'mp7' : 'mac10'); break;
                    case 'Digit4': if (down) switchWeapon('knife'); break;
                    case 'KeyE': if (down && team === 'T') tryPlantBomb(); break;
                }
            }

            function createBombModel() {
                bombModel = new THREE.Group();
                const box = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.35, 1), new THREE.MeshStandardMaterial({ color: 0x222222 }));
                bombModel.add(box);
                const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.6, 8), new THREE.MeshStandardMaterial({ color: 0x555555 }));
                handle.rotation.x = Math.PI / 2; handle.position.y = 0.3; bombModel.add(handle);
                bombLight = new THREE.PointLight(0xff0000, 0, 6); bombLight.position.set(0.2, 0.25, 0.4); bombModel.add(bombLight);
                bombModel.position.set(-45, 2.2, -55); bombModel.visible = false; scene.add(bombModel);
            }

            function tryPlantBomb() {
                if (planted || team !== 'T') return;
                if (camera.position.distanceTo(new THREE.Vector3(-45, 2.2, -55)) < 6) {
                    planted = true; bombModel.visible = true; bombTimer = 0;
                    showMessage("Bomb Planted!", 0xff0000);
                }
            }

            function spawnBots(count) {
                enemies.length = 0;
                const color = team === 'CT' ? 0xaa4422 : 0x2244aa;
                for (let i = 0; i < count; i++) {
                    const group = new THREE.Group();
                    const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.4, 0.9), new THREE.MeshStandardMaterial({ color }));
                    body.position.y = 0.7; group.add(body);
                    const head = new THREE.Mesh(new THREE.SphereGeometry(0.38, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffdddd }));
                    head.position.y = 1.65; head.userData.isHead = true; group.add(head);
                    group.position.set(-40 + Math.random() * 80, PLAYER.height / 2, -60 + Math.random() * 100);
                    group.userData = { health: 100, isEnemy: true, waypointIndex: Math.floor(Math.random() * waypoints.length) };
                    scene.add(group); enemies.push(group);
                }
            }

            function updateBots(dt) {
                enemies.forEach(bot => {
                    const toPlayer = camera.position.clone().sub(bot.position);
                    const dist = toPlayer.length();
                    if (dist < 45) {
                        toPlayer.y = 0; toPlayer.normalize();
                        bot.position.addScaledVector(toPlayer, 5.2 * dt);
                        bot.lookAt(camera.position);
                    } else {
                        const wp = waypoints[bot.userData.waypointIndex];
                        let toWp = wp.clone().sub(bot.position);
                        if (toWp.length() < 4) bot.userData.waypointIndex = (bot.userData.waypointIndex + 1) % waypoints.length;
                        else { toWp.y = 0; toWp.normalize(); bot.position.addScaledVector(toWp, 3.8 * dt); bot.lookAt(wp); }
                    }
                    if (Math.random() < 0.012 && dist < 38) { health -= 14 + Math.random() * 16; updateHUD(); if (health <= 0) die(); }
                });
            }

            function addLights() {
                scene.add(new THREE.HemisphereLight(0xfff0e0, 0x88aaff, 1.3));
                const sun = new THREE.DirectionalLight(0xffeecc, 1.7); sun.position.set(70, 130, 90); sun.castShadow = true; scene.add(sun);
            }

            function buildMiniDust2() {
                const sand = new THREE.MeshStandardMaterial({ color: 0xc9a678 });
                const wall = new THREE.MeshStandardMaterial({ color: 0xd9b894 });
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(150, 150), sand);
                floor.rotation.x = -Math.PI / 2; scene.add(floor); collidables.push(floor);

                function addBox(w, h, d, x, y, z, mat = wall) {
                    const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                    b.position.set(x, y, z); b.castShadow = b.receiveShadow = true; scene.add(b); collidables.push(b);
                }
                addBox(30, 14, 1, -45, 7, -60); addBox(1, 18, 40, -60, 9, -45);
                addBox(4, 14, 24, 0, 7, 0); addBox(6, 16, 80, -40, 8, -20); addBox(6, 16, 80, -10, 8, -20);
                addBox(24, 2, 24, -45, 1, -55, sand);
            }

            function createWeaponModel() {
                weaponGroup = new THREE.Group(); camera.add(weaponGroup);
                weaponGroup.position.set(0.45, -0.55, -0.95);
            }

            function startNewRound() {
                roundActive = true; isDead = false; health = 100; money = 800; timeLeft = 90; planted = false; bombTimer = 0;
                if (bombModel) bombModel.visible = false;
                camera.position.set(team === 'CT' ? 30 : -50, PLAYER.height, team === 'CT' ? 20 : -60);
                controls.getObject().position.copy(camera.position);
                enemies.forEach(e => scene.remove(e)); spawnBots(4);
                updateHUD(); showMessage("Round Start", 0xffff00);
            }

            function die() { isDead = true; showMessage(team === 'CT' ? "T WIN" : "CT WIN", 0xff4444); setTimeout(startNewRound, 4500); }
            function checkRoundEnd() { if (enemies.length === 0) { showMessage(team + " WIN", 0x44ff44); setTimeout(startNewRound, 4500); } }

            function showMessage(txt, col) {
                const el = document.getElementById('centerMsg');
                el.textContent = txt; el.style.color = '#' + col.toString(16).padStart(6, '0'); el.style.opacity = 1;
                setTimeout(() => el.style.opacity = 0, 4200);
            }

            function updateHUD() {
                document.getElementById('hp').textContent = Math.max(0, health | 0);
                document.getElementById('money').textContent = money;
                document.getElementById('weapon').textContent = WEAPONS[currentWeapon] ? WEAPONS[currentWeapon].name : 'Knife';
                document.getElementById('ammo').textContent = currentWeapon === 'knife' ? '∞' : `${ammo[currentWeapon] || 0} / ${WEAPONS[currentWeapon]?.max || 30}`;
            }

            function playSound(freq, duration, type = 'sawtooth') {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.type = type; o.frequency.value = freq;
                g.gain.value = 0.35; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + duration);
            }

            // ==================== INIT ====================
            function init() {
                scene = new THREE.Scene(); scene.background = new THREE.Color(0xaaccff);
                scene.fog = new THREE.FogExp2(0xaaccff, 0.0005);

                camera = new THREE.PerspectiveCamera(92, innerWidth / innerHeight, 0.08, 2000);
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(innerWidth, innerHeight); renderer.shadowMap.enabled = true;
                document.body.appendChild(renderer.domElement);

                controls = new THREE.PointerLockControls(camera, renderer.domElement);

                document.getElementById('instructions').addEventListener('click', () => controls.lock());
                controls.addEventListener('lock', () => { document.getElementById('instructions').style.display = 'none'; startNewRound(); });
                controls.addEventListener('unlock', () => { if (roundActive) document.getElementById('instructions').style.display = 'block'; roundActive = false; });

                window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

                document.addEventListener('keydown', e => handleKey(e.code, true));
                document.addEventListener('keyup', e => handleKey(e.code, false));
                document.addEventListener('mousedown', onMouseDown);
                document.addEventListener('contextmenu', e => e.preventDefault());

                document.getElementById('ct').onclick = () => startGame('CT');
                document.getElementById('t').onclick = () => startGame('T');
                document.getElementById('buyMenu').addEventListener('click', e => { if (e.target.classList.contains('weaponOption')) buyWeapon(e.target.id); });

                addLights(); buildMiniDust2(); createBombModel(); createWeaponModel();
                animate();
            }

            function startGame(selected) {
                team = selected;
                document.getElementById('teamSelect').style.display = 'none';
                document.getElementById('instructions').style.display = 'block';
                currentWeapon = team === 'CT' ? 'usps' : 'glock';
                ammo = { usps: 12, glock: 20, m4a4: 30, ak47: 30, mp7: 40, mac10: 30 };
                controls.lock();
            }

            let prevTime = performance.now();
            function animate() {
                requestAnimationFrame(animate);
                const dt = (performance.now() - prevTime) / 1000;
                prevTime = performance.now();

                if (controls.isLocked && roundActive && !isDead) {
                    velocity.x *= 0.85; velocity.z *= 0.85; velocity.y += PLAYER.gravity * dt;

                    const speed = move.sprint ? PLAYER.speed * PLAYER.sprintMult : PLAYER.speed;
                    const dir = new THREE.Vector3((move.right ? 1 : 0) - (move.left ? 1 : 0), 0, (move.fwd ? 1 : 0) - (move.bwd ? 1 : 0)).normalize();

                    velocity.x = dir.x * speed * -1; velocity.z = dir.z * speed * -1;

                    controls.moveRight(velocity.x * dt);
                    controls.moveForward(velocity.z * dt);
                    controls.getObject().position.y += velocity.y * dt;

                    if (controls.getObject().position.y < PLAYER.height) {
                        controls.getObject().position.y = PLAYER.height;
                        velocity.y = 0; canJump = true;
                    }

                    updateBots(dt);

                    if (planted) {
                        bombTimer += dt;
                        bombLight.intensity = 1.5 + Math.sin(performance.now() / 60) * 2;
                        if (bombTimer > 40) { showMessage("BOMB EXPLODED — T WIN", 0xff0000); setTimeout(startNewRound, 4500); }
                    }

                    for (let i = tracers.length - 1; i >= 0; i--) {
                        tracers[i].life -= dt;
                        tracers[i].obj.material.opacity = tracers[i].life / 0.14;
                        if (tracers[i].life <= 0) { scene.remove(tracers[i].obj); tracers.splice(i, 1); }
                    }

                    timeLeft -= dt;
                    const m = Math.floor(timeLeft / 60), s = Math.floor(timeLeft % 60);
                    document.getElementById('timer').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
                    if (timeLeft <= 0 && !planted) { showMessage("TIME OVER — CT WIN", 0x44ff44); setTimeout(startNewRound, 4500); }
                }
                renderer.render(scene, camera);
            }

            // ==================== START THE GAME ====================
            init();
        };
    </script>
</body>

</html>
